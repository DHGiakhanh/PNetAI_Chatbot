services:
  mongodb-chat:
    image: mongo:7.0
    container_name: pnetai_chat_db
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: petbot
      MONGO_INITDB_ROOT_PASSWORD: petbot_secret
      MONGO_INITDB_DATABASE: pnetai_chat
    volumes:
      - mongo_chat_data:/data/db
    networks:
      - pnetai_net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: pnetai_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - pnetai_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_chat_data:
  qdrant_data:

networks:
  pnetai_net:
    driver: bridge
